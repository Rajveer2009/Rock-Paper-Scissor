<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rock Paper Scissors - Hand Gesture Game</title>
        <link
            href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons"
            rel="stylesheet"
        />
        <style>
            /* Reset and base styles */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Roboto", sans-serif;
                background: radial-gradient(circle, #282c34, #1c1e22);
                min-height: 100vh;
                color: #e6e6e6;
                overflow-x: hidden;
            }

            /* Layout */
            .app-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }

            /* Header */
            .header {
                text-align: center;
                margin-bottom: 30px;
            }

            .header h1 {
                font-size: 2.5rem;
                font-weight: 700;
                margin-bottom: 10px;
            }

            .header p {
                font-size: 1.1rem;
                color: #a0a0a0;
                margin-bottom: 20px;
            }

            /* Scoreboard */
            .scoreboard {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-bottom: 30px;
            }

            .score-card {
                background: #21252b;
                padding: 20px;
                border-radius: 10px;
                text-align: center;
                border: 1px solid #3c4048;
            }

            .score-number {
                font-size: 2rem;
                font-weight: 700;
                margin-bottom: 5px;
                color: #ffffff;
            }

            .score-label {
                font-size: 1rem;
                color: #a0a0a0;
            }

            /* Game controls */
            .game-controls {
                text-align: center;
                margin-bottom: 30px;
            }

            .play-button {
                background: #495057;
                color: white;
                border: 1px solid #6c757d;
                padding: 15px 30px;
                font-size: 1.2rem;
                font-weight: 600;
                border-radius: 25px;
                cursor: pointer;
                transition: all 0.3s ease;
            }

            .play-button:hover:not(:disabled) {
                background: #6c757d;
                border-color: #adb5bd;
                transform: translateY(-2px);
            }

            .play-button:disabled {
                background: #343a40;
                border-color: #495057;
                color: #6c757d;
                cursor: not-allowed;
                transform: none;
            }

            /* Game container */
            .game-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
                margin-bottom: 30px;
            }

            .player-section,
            .computer-section {
                background: #21252b;
                border-radius: 15px;
                padding: 25px;
                border: 1px solid #3c4048;
            }

            .section-title {
                font-size: 1.5rem;
                font-weight: 600;
                margin-bottom: 15px;
                text-align: center;
                color: #ffffff;
            }

            /* Webcam */
            .webcam-container {
                display: none;
            }

            .video-wrapper {
                position: relative;
            }

            #webcam {
                width: 100%;
                height: auto;
                border-radius: 10px;
            }

            .output-canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            /* Gesture display */
            .gesture-output,
            .computer-choice {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 200px;
                background: #282c34;
                border-radius: 10px;
                margin-bottom: 15px;
                border: 1px solid #444952;
            }

            .computer-emoji {
                font-size: 4rem;
                margin-bottom: 10px;
            }

            .computer-move {
                font-size: 1.5rem;
                font-weight: 600;
                color: #ffffff;
            }

            /* Status indicator */
            .status-indicator {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 10px;
                background: #282c34;
                border: 1px solid #444952;
                border-radius: 25px;
                color: #a0a0a0;
                font-size: 0.9rem;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #6c757d;
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* Game result */
            .game-result {
                text-align: center;
                padding: 20px;
                background: #282c34;
                border-radius: 10px;
                margin-bottom: 20px;
                border: 1px solid #3c4048;
                display: none;
            }

            .result-text {
                font-size: 1.5rem;
                font-weight: 600;
                margin-bottom: 10px;
                color: #ffffff;
            }

            .result-details {
                font-size: 1rem;
                color: #a0a0a0;
            }

            /* Countdown */
            .countdown {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(10, 10, 10, 0.9);
                color: white;
                padding: 30px;
                border-radius: 20px;
                text-align: center;
                z-index: 1000;
                font-size: 3rem;
                font-weight: 700;
                min-width: 200px;
                display: none;
                border: 1px solid #444;
            }

            /* Loading spinner */
            .loading-spinner {
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                padding: 40px;
                text-align: center;
            }

            .loading-spinner.active {
                display: flex;
            }

            .mdc-circular-progress__indeterminate-circle-graphic {
                stroke: #e6e6e6 !important;
            }

            /* Error message */
            .error-message {
                background: #4d2a2a;
                color: #ff9999;
                padding: 15px;
                border-radius: 10px;
                margin-bottom: 20px;
                border: 1px solid #863838;
                display: none;
            }

            .error-message.active {
                display: block;
            }

            /* Utility classes */
            .invisible {
                display: none;
            }

            /* Responsive design */
            @media (max-width: 768px) {
                .game-container {
                    grid-template-columns: 1fr;
                }

                .header h1 {
                    font-size: 2rem;
                }

                .scoreboard {
                    grid-template-columns: 1fr;
                }
            }

            @media (max-width: 480px) {
                .app-container {
                    padding: 15px;
                }

                .header h1 {
                    font-size: 1.8rem;
                }

                .play-button {
                    padding: 12px 24px;
                    font-size: 1rem;
                }

                .computer-emoji {
                    font-size: 3rem;
                }

                .computer-move {
                    font-size: 1.2rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="app-container">
            <header class="header">
                <h1>🎮 Rock Paper Scissors</h1>
                <p>Play against the computer using hand gestures!</p>
            </header>

            <section class="scoreboard">
                <div class="score-card">
                    <div class="score-number" id="playerScore">0</div>
                    <div class="score-label">Your Score</div>
                </div>
                <div class="score-card">
                    <div class="score-number" id="tieScore">0</div>
                    <div class="score-label">Ties</div>
                </div>
                <div class="score-card">
                    <div class="score-number" id="computerScore">0</div>
                    <div class="score-label">Computer Score</div>
                </div>
            </section>

            <section class="game-result" id="gameResult">
                <div class="result-text" id="resultText"></div>
                <div class="result-details" id="resultDetails"></div>
            </section>

            <section class="game-controls">
                <button class="play-button" id="playButton" disabled>
                    Loading AI Model...
                </button>
            </section>

            <section id="gameSection" class="game-section invisible">
                <div class="game-container">
                    <div class="player-section">
                        <div class="section-title">👤 Your Move</div>
                        <div id="gestureOutput" class="gesture-output"></div>
                        <div class="webcam-container">
                            <div class="video-wrapper">
                                <video id="webcam" autoplay playsinline></video>
                                <canvas
                                    class="output-canvas"
                                    id="outputCanvas"
                                    width="1280"
                                    height="720"
                                ></canvas>
                            </div>
                        </div>
                        <div class="status-indicator" id="statusIndicator">
                            <div class="status-dot"></div>
                            <span>Loading AI Model...</span>
                        </div>
                    </div>

                    <div class="computer-section">
                        <div class="section-title">🤖 Computer Move</div>
                        <div class="computer-choice" id="computerChoice">
                            <div class="computer-emoji" id="computerEmoji">
                                🤖
                            </div>
                            <div class="computer-move" id="computerMove">
                                Ready to play!
                            </div>
                        </div>
                        <div class="status-indicator">
                            <div class="status-dot"></div>
                            <span>Waiting for game...</span>
                        </div>
                    </div>
                </div>
            </section>

            <div class="error-message" id="errorMessage">
                <strong>Error:</strong> <span id="errorText"></span>
            </div>

            <div class="loading-spinner active" id="loadingSpinner">
                <div
                    class="mdc-circular-progress mdc-circular-progress--indeterminate"
                    role="progressbar"
                    aria-label="Loading..."
                >
                    <div class="mdc-circular-progress__determinate-container">
                        <svg
                            class="mdc-circular-progress__determinate-circle-graphic"
                            viewBox="0 0 48 48"
                        >
                            <circle
                                class="mdc-circular-progress__determinate-track"
                                cx="24"
                                cy="24"
                                r="18"
                                stroke-width="4"
                            />
                            <circle
                                class="mdc-circular-progress__determinate-circle"
                                cx="24"
                                cy="24"
                                r="18"
                                stroke-dasharray="113.097"
                                stroke-dashoffset="113.097"
                                stroke-width="4"
                            />
                        </svg>
                    </div>
                    <div class="mdc-circular-progress__indeterminate-container">
                        <div class="mdc-circular-progress__spinner-layer">
                            <div
                                class="mdc-circular-progress__circle-clipper mdc-circular-progress__circle-left"
                            >
                                <svg
                                    class="mdc-circular-progress__indeterminate-circle-graphic"
                                    viewBox="0 0 48 48"
                                >
                                    <circle
                                        cx="24"
                                        cy="24"
                                        r="18"
                                        stroke-dasharray="113.097"
                                        stroke-dashoffset="56.549"
                                        stroke-width="4"
                                    />
                                </svg>
                            </div>
                            <div class="mdc-circular-progress__gap-patch">
                                <svg
                                    class="mdc-circular-progress__indeterminate-circle-graphic"
                                    viewBox="0 0 48 48"
                                >
                                    <circle
                                        cx="24"
                                        cy="24"
                                        r="18"
                                        stroke-dasharray="113.097"
                                        stroke-dashoffset="56.549"
                                        stroke-width="3.2"
                                    />
                                </svg>
                            </div>
                            <div
                                class="mdc-circular-progress__circle-clipper mdc-circular-progress__circle-right"
                            >
                                <svg
                                    class="mdc-circular-progress__indeterminate-circle-graphic"
                                    viewBox="0 0 48 48"
                                >
                                    <circle
                                        cx="24"
                                        cy="24"
                                        r="18"
                                        stroke-dasharray="113.097"
                                        stroke-dashoffset="56.549"
                                        stroke-width="4"
                                    />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <p>Initializing AI model and camera...</p>
            </div>

            <div class="countdown" id="countdown">3</div>
        </div>

        <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
        <script type="module">
            import {
                GestureRecognizer,
                FilesetResolver,
            } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

            // Constants
            const GESTURE_MAPPINGS = {
                EMOJIS: {
                    Victory: "✌️",
                    Open_Palm: "🖐️",
                    Closed_Fist: "✊",
                    Thumb_Up: "👍",
                },
                MOVES: {
                    Victory: "Scissors",
                    Open_Palm: "Paper",
                    Closed_Fist: "Rock",
                },
                MOVE_EMOJIS: {
                    Rock: "✊",
                    Paper: "🖐️",
                    Scissors: "✌️",
                },
            };

            const GAME_MOVES = ["Rock", "Paper", "Scissors"];
            const COUNTDOWN_DURATION = 3;
            const RESULT_DISPLAY_TIME = 3000;

            // Game state management
            class GameState {
                constructor() {
                    this.reset();
                }

                reset() {
                    this.playerScore = 0;
                    this.computerScore = 0;
                    this.tieScore = 0;
                    this.isPlaying = false;
                    this.currentPlayerMove = null;
                    this.currentComputerMove = null;
                }
            }

            // DOM element management
            class DOMElements {
                constructor() {
                    this.gameSection = document.getElementById("gameSection");
                    this.loadingSpinner =
                        document.getElementById("loadingSpinner");
                    this.statusIndicator =
                        document.getElementById("statusIndicator");
                    this.errorMessage = document.getElementById("errorMessage");
                    this.errorText = document.getElementById("errorText");
                    this.playButton = document.getElementById("playButton");
                    this.countdown = document.getElementById("countdown");
                    this.gameResult = document.getElementById("gameResult");
                    this.resultText = document.getElementById("resultText");
                    this.resultDetails =
                        document.getElementById("resultDetails");

                    // Score elements
                    this.playerScoreEl = document.getElementById("playerScore");
                    this.computerScoreEl =
                        document.getElementById("computerScore");
                    this.tieScoreEl = document.getElementById("tieScore");

                    // Game elements
                    this.computerEmoji =
                        document.getElementById("computerEmoji");
                    this.computerMove = document.getElementById("computerMove");

                    // Webcam elements
                    this.video = document.getElementById("webcam");
                    this.canvasElement =
                        document.getElementById("outputCanvas");
                    this.canvasCtx = this.canvasElement?.getContext("2d");
                    this.gestureOutput =
                        document.getElementById("gestureOutput");
                }
            }

            // Gesture recognition management
            class GestureManager {
                constructor() {
                    this.gestureRecognizer = null;
                    this.runningMode = "IMAGE";
                    this.webcamRunning = false;
                    this.currentGesture = null;
                    this.thumbsUpDetected = false;
                    this.thumbsUpTimeout = null;
                    this.lastVideoTime = -1;
                    this.results = undefined;
                }

                async initialize() {
                    try {
                        const vision = await FilesetResolver.forVisionTasks(
                            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm",
                        );

                        this.gestureRecognizer =
                            await GestureRecognizer.createFromOptions(vision, {
                                baseOptions: {
                                    modelAssetPath:
                                        "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                                    delegate: "GPU",
                                },
                                runningMode: this.runningMode,
                            });

                        return true;
                    } catch (error) {
                        console.error(
                            "Error creating gesture recognizer:",
                            error,
                        );
                        return false;
                    }
                }

                getGestureEmoji(gestureName) {
                    return GESTURE_MAPPINGS.EMOJIS[gestureName] || "👋";
                }

                async enableWebcam(video, onLoadedData) {
                    if (!navigator.mediaDevices?.getUserMedia) {
                        throw new Error(
                            "Webcam is not supported by your browser",
                        );
                    }

                    if (!this.gestureRecognizer) {
                        throw new Error("AI model not loaded yet");
                    }

                    const constraints = { video: true };
                    const stream =
                        await navigator.mediaDevices.getUserMedia(constraints);

                    video.srcObject = stream;
                    video.addEventListener("loadeddata", onLoadedData);
                    this.webcamRunning = true;
                }

                handleThumbsUp(onThumbsUp) {
                    if (!this.thumbsUpDetected && onThumbsUp) {
                        this.thumbsUpDetected = true;

                        if (this.thumbsUpTimeout) {
                            clearTimeout(this.thumbsUpTimeout);
                        }

                        this.thumbsUpTimeout = setTimeout(() => {
                            onThumbsUp();
                        }, 500);
                    }
                }

                async predict(video, gestureOutput) {
                    if (!this.webcamRunning || !this.gestureRecognizer) return;

                    try {
                        if (this.runningMode === "IMAGE") {
                            this.runningMode = "VIDEO";
                            await this.gestureRecognizer.setOptions({
                                runningMode: "VIDEO",
                            });
                        }

                        const nowInMs = Date.now();
                        if (video.currentTime !== this.lastVideoTime) {
                            this.lastVideoTime = video.currentTime;
                            this.results =
                                this.gestureRecognizer.recognizeForVideo(
                                    video,
                                    nowInMs,
                                );
                        }

                        this.displayGestureResults(gestureOutput);
                        window.requestAnimationFrame(() =>
                            this.predict(video, gestureOutput),
                        );
                    } catch (error) {
                        console.error("Error in prediction loop:", error);
                        throw new Error("Recognition error occurred");
                    }
                }

                displayGestureResults(gestureOutput) {
                    if (this.results?.gestures.length > 0) {
                        const categoryName =
                            this.results.gestures[0][0].categoryName;
                        const emoji = this.getGestureEmoji(categoryName);
                        const move =
                            GESTURE_MAPPINGS.MOVES[categoryName] || "None";

                        if (categoryName === "Thumb_Up") {
                            this.handleThumbsUp(() => window.game?.playGame());
                        }

                        this.currentGesture = move !== "None" ? move : null;

                        const displayText =
                            categoryName === "Thumb_Up"
                                ? "Starting Game!"
                                : move;
                        gestureOutput.innerHTML = `
                        <div class="computer-emoji">${emoji}</div>
                        <div class="computer-move">${displayText}</div>
                    `;
                    } else {
                        this.currentGesture = null;
                        gestureOutput.innerHTML = `
                        <div class="computer-emoji">👋</div>
                        <div class="computer-move">Show Your Hand</div>
                    `;
                    }
                }
            }

            // Main game class
            class RockPaperScissorsGame {
                constructor() {
                    this.state = new GameState();
                    this.dom = new DOMElements();
                    this.gestureManager = new GestureManager();

                    this.init();
                }

                async init() {
                    this.setupEventListeners();
                    await this.initializeGame();
                }

                setupEventListeners() {
                    this.dom.playButton.addEventListener("click", () =>
                        this.playGame(),
                    );
                }

                async initializeGame() {
                    try {
                        this.updateStatus("Loading AI model...");

                        const success = await this.gestureManager.initialize();
                        if (!success) {
                            throw new Error("Failed to load AI model");
                        }

                        this.dom.loadingSpinner.classList.remove("active");
                        this.dom.gameSection.classList.remove("invisible");
                        this.updateStatus("AI model ready! Starting camera...");

                        this.dom.playButton.disabled = false;
                        this.dom.playButton.textContent = "Start Game";

                        await this.enableWebcam();
                    } catch (error) {
                        console.error("Error initializing game:", error);
                        this.dom.loadingSpinner.classList.remove("active");
                        this.showError(
                            "Failed to load AI model. Please refresh the page and try again.",
                        );
                        this.updateStatus("Failed to load AI model", true);
                    }
                }

                async enableWebcam() {
                    try {
                        this.updateStatus("Requesting camera access...");

                        await this.gestureManager.enableWebcam(
                            this.dom.video,
                            () =>
                                this.gestureManager.predict(
                                    this.dom.video,
                                    this.dom.gestureOutput,
                                ),
                        );

                        this.updateStatus(
                            "Ready to play! Show thumbs up to start!",
                        );
                    } catch (error) {
                        console.error("Error accessing webcam:", error);
                        this.showError(
                            "Could not access webcam. Please ensure you have granted permission.",
                        );
                        this.updateStatus("Webcam access denied", true);
                    }
                }

                showError(message) {
                    this.dom.errorText.textContent = message;
                    this.dom.errorMessage.classList.add("active");
                }

                updateStatus(message, isError = false) {
                    const statusText =
                        this.dom.statusIndicator.querySelector("span");
                    if (statusText) {
                        statusText.textContent = message;
                    }

                    const indicator = this.dom.statusIndicator;
                    if (isError) {
                        indicator.style.background = "#4d2a2a";
                        indicator.style.color = "#ff9999";
                        indicator.style.borderColor = "#863838";
                    } else {
                        indicator.style.background = "#282c34";
                        indicator.style.color = "#a0a0a0";
                        indicator.style.borderColor = "#444952";
                    }
                }

                updateScores() {
                    this.dom.playerScoreEl.textContent = this.state.playerScore;
                    this.dom.computerScoreEl.textContent =
                        this.state.computerScore;
                    this.dom.tieScoreEl.textContent = this.state.tieScore;
                }

                generateComputerMove() {
                    return GAME_MOVES[
                        Math.floor(Math.random() * GAME_MOVES.length)
                    ];
                }

                determineWinner(playerMove, computerMove) {
                    if (playerMove === computerMove) return "tie";

                    const winConditions = {
                        Rock: "Scissors",
                        Paper: "Rock",
                        Scissors: "Paper",
                    };

                    return winConditions[playerMove] === computerMove
                        ? "player"
                        : "computer";
                }

                showGameResult(winner, playerMove, computerMove) {
                    const results = {
                        tie: {
                            message: "It's a Tie! 🤝",
                            detail: `Both played ${playerMove}`,
                            scoreUpdate: () => this.state.tieScore++,
                        },
                        player: {
                            message: "You Win! 🎉",
                            detail: `${playerMove} beats ${computerMove}`,
                            scoreUpdate: () => this.state.playerScore++,
                        },
                        computer: {
                            message: "Computer Wins! 🤖",
                            detail: `${computerMove} beats ${playerMove}`,
                            scoreUpdate: () => this.state.computerScore++,
                        },
                    };

                    const result = results[winner];
                    result.scoreUpdate();

                    this.dom.resultText.textContent = result.message;
                    this.dom.resultDetails.textContent = result.detail;
                    this.dom.gameResult.style.display = "block";
                    this.updateScores();

                    setTimeout(() => {
                        this.dom.gameResult.style.display = "none";
                    }, RESULT_DISPLAY_TIME);
                }

                async startCountdown() {
                    return new Promise((resolve) => {
                        let count = COUNTDOWN_DURATION;
                        this.dom.countdown.style.display = "block";
                        this.dom.countdown.textContent = count;

                        const countdownInterval = setInterval(() => {
                            count--;
                            if (count > 0) {
                                this.dom.countdown.textContent = count;
                            } else if (count === 0) {
                                this.dom.countdown.textContent = "SHOW!";
                            } else {
                                this.dom.countdown.style.display = "none";
                                clearInterval(countdownInterval);
                                resolve();
                            }
                        }, 1000);
                    });
                }

                async playGame() {
                    if (this.state.isPlaying) return;

                    this.state.isPlaying = true;
                    this.gestureManager.thumbsUpDetected = false;
                    this.dom.playButton.disabled = true;
                    this.dom.playButton.textContent = "Playing...";

                    // Reset computer display
                    this.dom.computerEmoji.textContent = "🤖";
                    this.dom.computerMove.textContent = "Getting ready...";

                    await this.startCountdown();

                    // Generate computer move
                    this.state.currentComputerMove =
                        this.generateComputerMove();
                    this.dom.computerEmoji.textContent =
                        GESTURE_MAPPINGS.MOVE_EMOJIS[
                            this.state.currentComputerMove
                        ];
                    this.dom.computerMove.textContent =
                        this.state.currentComputerMove;

                    // Capture player move
                    this.state.currentPlayerMove =
                        this.gestureManager.currentGesture || "Rock";

                    // Determine winner
                    const winner = this.determineWinner(
                        this.state.currentPlayerMove,
                        this.state.currentComputerMove,
                    );

                    this.showGameResult(
                        winner,
                        this.state.currentPlayerMove,
                        this.state.currentComputerMove,
                    );

                    // Reset game state
                    this.state.isPlaying = false;
                    this.dom.playButton.disabled = false;
                    this.dom.playButton.textContent = "Start Game";
                }
            }

            // Initialize game when DOM is loaded
            document.addEventListener("DOMContentLoaded", () => {
                // Initialize Material Design Components
                if (window.mdc && window.mdc.circularProgress) {
                    const circularProgress =
                        new mdc.circularProgress.MDCCircularProgress(
                            document.querySelector(".mdc-circular-progress"),
                        );
                }

                // Initialize game and make it globally accessible
                window.game = new RockPaperScissorsGame();
            });
        </script>
    </body>
</html>
